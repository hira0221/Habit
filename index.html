<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1b202b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="習慣チェック">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-20260306.png">
<link rel="apple-touch-icon-precomposed" sizes="180x180" href="/apple-touch-icon-20260306.png">
<title>習慣チェック</title>

<style>
:root {
  --bg: #1b202b;
  --surface: #242b38;
  --surface-2: #2d3647;
  --text: #e9edf5;
  --muted: #aab3c5;
  --border: #3a4357;
  --accent: #63a4ff;
  --danger: #d9534f;
  --done-bg: #173428;
  --done-flash: #1f4a37;
  --done-text: #8ad8ae;
  --soft-green: #79c9a0;
  --soft-red: #e68d8d;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.app {
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ===== ヘッダー ===== */
header {
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.header-top {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 34px;
}

header h1 {
  font-size: 22px;
  margin: 0;
  text-align: center;
  line-height: 1.2;
}

.streak {
  font-size: 12px;
  color: #ffd36a;
  margin-top: 4px;
  min-height: 16px;
  line-height: 16px;
  text-align: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.2s ease;
}

.streak.show {
  opacity: 1;
  visibility: visible;
}

.edit-btn {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  border-radius: 999px;
  padding: 6px 12px;
  font-size: 12px;
}

.app.edit-mode .edit-btn {
  background: var(--accent);
  color: #08131f;
  border-color: transparent;
}

.menu-btn {
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  border: none;
  background: transparent;
  color: var(--text);
  border-radius: 10px;
  width: 40px;
  height: 40px;
  padding: 0;
  font-size: 24px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.header-menu {
  position: fixed;
  inset: 0;
  background: rgba(8, 12, 20, 0.34);
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition: opacity 0.2s ease, visibility 0.2s ease;
  z-index: 60;
}

.header-menu.show {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
}

.header-menu-panel {
  width: min(80vw, 280px);
  height: 100%;
  padding: max(16px, env(safe-area-inset-top)) 12px 12px;
  border-right: 1px solid var(--border);
  background: rgba(36, 43, 56, 0.98);
  box-shadow: 12px 0 24px rgba(0,0,0,0.28);
  transform: translateX(-100%);
  transition: transform 0.24s cubic-bezier(0.22, 1, 0.36, 1);
}

.header-menu.show .header-menu-panel {
  transform: translateX(0);
}

.header-menu-title {
  margin: 2px 4px 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.02em;
}

.header-menu-list {
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.header-menu-item {
  width: 100%;
  border: none;
  border-bottom: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  text-align: left;
  border-radius: 0;
  padding: 13px 10px;
  font-size: 15px;
  font-weight: 500;
  margin: 0;
  display: block;
}

.header-menu-item:last-child {
  border-bottom: none;
}

.header-menu-item:active,
.header-menu-item:hover {
  background: rgba(59, 69, 91, 0.42);
}


.progress-wrap {
  padding: 12px 16px 22px;
}

.time-slot-switch {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
  max-width: 320px;
  margin: 0 auto 10px;
}

.time-slot-btn {
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  border-radius: 999px;
  min-height: 34px;
  font-size: 12px;
}

.time-slot-btn.active {
  background: var(--accent);
  border-color: transparent;
  color: #08131f;
  font-weight: 700;
}

.progress-slider {
  display: flex;
  flex-wrap: nowrap;
  overflow-x: auto;
  overflow-y: visible;
  scroll-snap-type: x mandatory;
  scrollbar-width: none;
  -ms-overflow-style: none;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-x: contain;
  touch-action: pan-x;
}

.progress-slider::-webkit-scrollbar {
  display: none;
}

.progress-page {
  flex: 0 0 100%;
  min-width: 100%;
  scroll-snap-align: start;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.progress-page.ring-page {
  min-height: 184px;
  align-items: center;
}

.progress-page.ring-page .progress-ring {
  margin-top: 2px;
}

.progress-ring {
  width: 164px;
  height: 164px;
  margin: 0 auto;
  position: relative;
}

.progress-ring svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.ring-track {
  fill: none;
  stroke: #3b455b;
  stroke-width: 10;
}

.ring-value {
  fill: none;
  stroke: #79c9a0;
  stroke-width: 10;
  stroke-linecap: round;
  transition:
    stroke-dashoffset 0.45s cubic-bezier(0.22, 1, 0.36, 1),
    stroke 0.55s ease;
}

.ring-value.complete {
  stroke: #79c9a0;
}

.progress-ring.animate {
  animation: ring-pop 0.28s ease-out;
}

.history-panel {
  width: min(100%, 360px);
  min-height: 170px;
  margin: 0 auto;
}

.history-svg {
  width: 100%;
  height: 128px;
  display: block;
}

.history-grid {
  stroke: #3b455b;
  stroke-width: 1;
  opacity: 0.55;
}

.history-path {
  fill: none;
  stroke: #79c9a0;
  stroke-width: 3.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.history-dots circle {
  fill: #79c9a0;
}

.history-dots circle.active {
  fill: #6fb6ff;
}

.history-dots circle.fallback {
  opacity: 0.45;
}

.history-dots .dot-hit {
  fill: transparent;
  pointer-events: all;
  cursor: pointer;
}

.history-labels {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-top: 6px;
  font-size: 11px;
  color: var(--muted);
  text-align: center;
}

.history-title {
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
}

.history-scope-switch {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 6px;
  margin-bottom: 8px;
}

.history-scope-btn {
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  border-radius: 999px;
  min-height: 28px;
  font-size: 11px;
}

.history-scope-btn.active {
  background: var(--accent);
  border-color: transparent;
  color: #08131f;
  font-weight: 700;
}

.history-scope-meta {
  min-height: 14px;
  margin: -2px 0 6px;
  text-align: right;
  font-size: 10px;
  color: var(--muted);
}

.history-detail {
  margin-top: 8px;
  padding: 8px 10px;
  border-radius: 10px;
  background: rgba(27, 32, 43, 0.65);
  border: 1px solid var(--border);
}

.history-detail-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 8px;
  font-size: 11px;
  color: var(--muted);
}

.history-detail-rate {
  color: var(--text);
  font-size: 13px;
  font-weight: 700;
}

.history-detail-list {
  list-style: none;
  margin: 8px 0 0;
  padding: 0;
  max-height: 72px;
  overflow-y: auto;
}

.history-detail-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text);
  padding: 2px 0;
}

.history-slot-badge {
  min-width: 24px;
  text-align: center;
  font-size: 10px;
  line-height: 1.5;
  padding: 1px 6px;
  border-radius: 999px;
  border: 1px solid var(--border);
  color: var(--muted);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex: 0 0 8px;
}

.status-dot.done {
  background: var(--soft-green);
}

.status-dot.todo {
  background: var(--soft-red);
}

.history-empty {
  margin-top: 8px;
  font-size: 11px;
  color: var(--muted);
}

.history-scope-note {
  margin-top: 6px;
  font-size: 10px;
  color: var(--muted);
  text-align: right;
}

.progress-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 8px;
}

.progress-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #5a6376;
}

.progress-dot.active {
  background: #8abfff;
}

.progress-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.progress-percent {
  font-size: 30px;
  font-weight: 700;
  line-height: 1;
}

@keyframes ring-pop {
  0% { transform: scale(0.97); }
  70% { transform: scale(1.02); }
  100% { transform: scale(1); }
}

/* ===== リスト ===== */
.list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 8px 12px 118px;
}

.empty-hint {
  display: none;
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  padding: 8px 0 10px;
}

.empty-hint.show {
  display: block;
}

/* スワイプ用ラッパー */
.swipe-wrapper {
  position: relative;
  overflow: hidden;
  margin-bottom: 8px;
  border-radius: 10px;
  transition: transform 0.18s ease;
}

/* 削除エリア（初期非表示） */
.delete-area {
  position: absolute;
  right: 0;
  top: 0;
  width: 72px;
  height: 100%;
  background: var(--danger);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 13px;
  transform: translateX(100%);
  transition: transform 0.2s ease;
}

.swipe-wrapper.swiped .delete-area {
  transform: translateX(0);
}

/* ===== アイテム本体 ===== */
.item {
  display: flex;
  align-items: stretch;
  background: var(--surface-2);
  user-select: none;
  transform: translateX(0);
  transition:
    transform 0.2s ease,
    background-color 0.25s ease-out;
}

.item.dragging {
  transition: none;
  opacity: 0.96;
  position: relative;
  z-index: 30;
  pointer-events: none;
  box-shadow: 0 10px 20px rgba(0,0,0,0.25);
}

.swipe-wrapper.drag-source {
  overflow: visible;
  z-index: 5;
}

/* swiped 時 */
.swipe-wrapper.swiped .item {
  transform: translateX(-72px);
}

/* 完了時 */
/* ===== 完了ワンアクション演出 ===== */

/* 完了直後の一瞬だけ濃い緑 */
.item.just-done {
  background-color: var(--done-flash);
}

.item.done {
  background-color: var(--done-bg);
}

/* チェックのアニメーション */
.check {
  font-size: 18px;
  color: var(--done-text);
  opacity: 0;
  transform: scale(0.7);
  transition:
    transform 0.25s ease-out,
    opacity 0.15s ease-out;
}

.item.done .check {
  opacity: 1;
  transform: scale(1);
}

.item.done {
  background: var(--done-bg);
}

.item.done .text {
  color: var(--done-text);
}

.drag-handle {
  width: 0;
  display: flex;
  overflow: hidden;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  touch-action: none;
  opacity: 0;
  pointer-events: none;
  transform: translateX(-8px) scale(0.94);
  transition:
    width 0.56s ease,
    opacity 0.48s ease,
    transform 0.62s cubic-bezier(0.22, 1, 0.36, 1);
}

.app.edit-mode .drag-handle {
  width: 40px;
  opacity: 1;
  pointer-events: auto;
  transform: translateX(0) scale(1);
}

.edit-item-btn {
  display: none;
  width: 48px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-size: 12px;
}

.app.edit-mode .edit-item-btn {
  display: block;
}

/* テキスト */
.text {
  flex: 1;
  padding: 14px 12px;
  font-size: 15px;
  transform: translateX(0);
  transition: transform 0.62s cubic-bezier(0.22, 1, 0.36, 1);
}

.app.edit-mode .text {
  transform: translateX(6px);
}

/* チェックエリア（背景は全体と同化） */
.check-area {
  width: 40px;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== 下部ドック ===== */
.bottom-dock-wrap {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  justify-content: center;
  pointer-events: none;
  padding: 0 12px calc(32px + env(safe-area-inset-bottom));
  z-index: 20;
}

.bottom-dock {
  width: min(100%, 336px);
  height: 76px;
  padding: 0 8px;
  border-radius: 24px;
  background: rgba(36, 43, 56, 0.82);
  border: 1px solid rgba(138, 191, 255, 0.22);
  box-shadow: 0 12px 22px rgba(0,0,0,0.3);
  backdrop-filter: blur(8px);
  pointer-events: auto;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  align-items: center;
}

.dock-btn {
  border: none;
  background: transparent;
  color: var(--text);
  border-radius: 999px;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  justify-self: center;
}

.add-btn {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #08131f;
  font-size: 28px;
  box-shadow: 0 6px 12px rgba(0,0,0,0.28);
}

.dock-icon {
  font-size: 24px;
  line-height: 1;
}

.calendar-dock-btn {
  transform: translateX(-6px);
}

.calendar-dock-svg {
  width: 28px;
  height: 28px;
  display: block;
}

.history-dock-btn {
  transform: translateX(6px);
}

.history-dock-svg {
  width: 26px;
  height: 26px;
  display: block;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(8, 12, 20, 0.5);
  backdrop-filter: blur(3px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  z-index: 100;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition: opacity 0.22s ease, visibility 0.22s ease;
}

.modal-backdrop.show {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
}

.habit-modal {
  width: min(100%, 360px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  box-shadow: 0 14px 28px rgba(0,0,0,0.35);
  opacity: 0;
  transform: translateY(12px) scale(0.98);
  transition: transform 0.24s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.2s ease;
}

.modal-backdrop.show .habit-modal {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.habit-modal-title {
  margin: 0 0 10px;
  font-size: 15px;
  text-align: center;
}

.habit-modal-input {
  width: 100%;
  box-sizing: border-box;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface-2);
  color: var(--text);
  font-size: 16px;
  text-align: center;
  padding: 10px 12px;
  outline: none;
}

.habit-modal-input:focus {
  border-color: var(--accent);
}

.habit-slot-picker {
  margin-top: 10px;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
}

.habit-slot-btn {
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  border-radius: 999px;
  min-height: 34px;
  font-size: 12px;
}

.habit-slot-btn.active {
  background: var(--accent);
  border-color: transparent;
  color: #08131f;
  font-weight: 700;
}

.habit-modal-actions {
  margin-top: 12px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 8px;
}

.habit-modal-btn {
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 7px 12px;
  background: var(--surface-2);
  color: var(--text);
  font-size: 14px;
  touch-action: manipulation;
}

.habit-modal-btn.primary {
  background: var(--accent);
  border-color: transparent;
  color: #08131f;
  grid-column: 2;
}

.habit-modal-btn.cancel {
  grid-column: 3;
  justify-self: end;
}

.confirm-modal-message {
  margin: 0;
  font-size: 13px;
  line-height: 1.5;
  color: var(--text);
  white-space: pre-line;
  text-align: center;
}

.confirm-modal-actions {
  margin-top: 12px;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 34px;
}

#confirmModalOk {
  margin: 0 auto;
}

#confirmModalCancel {
  position: absolute;
  right: 0;
}

.settings-modal {
  width: min(100%, 420px);
  max-height: min(86vh, 680px);
  overflow: auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px;
  box-shadow: 0 14px 28px rgba(0,0,0,0.35);
  opacity: 0;
  transform: translateY(12px) scale(0.98);
  transition: transform 0.24s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.2s ease;
}

.modal-backdrop.show .settings-modal {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.settings-section {
  border: 1px solid var(--border);
  background: var(--surface-2);
  border-radius: 12px;
  padding: 10px;
}

.settings-section + .settings-section {
  margin-top: 10px;
}

.settings-section-title {
  margin: 0 0 8px;
  font-size: 13px;
  color: var(--muted);
}

.settings-field {
  display: grid;
  gap: 6px;
  margin-top: 8px;
}

.settings-field label {
  font-size: 12px;
  color: var(--muted);
}

.settings-select,
.settings-time {
  width: 100%;
  box-sizing: border-box;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: #101725;
  color: var(--text);
  padding: 8px 10px;
  font-size: 14px;
}

.settings-switch {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-top: 8px;
}

.settings-switch label {
  font-size: 13px;
}

.settings-switch input {
  width: 18px;
  height: 18px;
}

.settings-note {
  margin-top: 8px;
  font-size: 11px;
  color: var(--muted);
}

.calendar-modal {
  width: min(100%, 420px);
  height: min(80vh, 620px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 12px;
  box-shadow: 0 14px 28px rgba(0,0,0,0.35);
  opacity: 0;
  transform: translateY(12px) scale(0.98);
  transition: transform 0.24s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.2s ease;
  display: flex;
  flex-direction: column;
  gap: 10px;
  touch-action: manipulation;
}

.modal-backdrop.show .calendar-modal {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.calendar-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.calendar-title {
  margin: 0;
  font-size: 15px;
  font-weight: 700;
}

.calendar-close-btn {
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  width: 30px;
  height: 30px;
  border-radius: 50%;
  font-size: 16px;

.calendar-day[data-level="mid"] {

.calendar-year-grid {

.calendar-month-ring-track {

<script>

const DATE_KEY = "lastOpenedDate";
const STORAGE_KEY = "habits";
const STREAK_COUNT_KEY = "streakCount";
const STREAK_LAST_DATE_KEY = "streakLastDate";
const RATE_HISTORY_KEY = "rateHistoryByDate";
const DAILY_SNAPSHOT_KEY = "dailySnapshotByDate";
const APP_SETTINGS_KEY = "appSettings";
const NOTIFICATION_SETTINGS_KEY = "notificationSettings";
const PUSH_CLIENT_ID_KEY = "pushClientId";
const DEFAULT_APP_SETTINGS = {
  defaultHistoryScope: "all",
  confirmBeforeDelete: true
};
const DEFAULT_NOTIFICATION_SETTINGS = {
  enabled: false,
  morning: "08:00",
  noon: "12:00",
  night: "21:00"
};
const APP_STORAGE_KEYS = [
  STORAGE_KEY,
  DATE_KEY,
  STREAK_COUNT_KEY,
  STREAK_LAST_DATE_KEY,
  RATE_HISTORY_KEY,
  DAILY_SNAPSHOT_KEY,
  APP_SETTINGS_KEY,
  NOTIFICATION_SETTINGS_KEY
];
const TIME_SLOTS = [
  { id: "morning", label: "朝" },
  { id: "noon", label: "昼" },
  { id: "night", label: "夜" }
];
const HISTORY_SCOPES = ["all", "morning", "noon", "night"];
const HISTORY_SCOPE_COLORS = {
  all: "#79c9a0",
  morning: "#f6b26b",
  noon: "#ffffff",
  night: "#6fb6ff"
};
const MAIN_RING_SLOT_COLORS = {
  morning: HISTORY_SCOPE_COLORS.morning,
  noon: HISTORY_SCOPE_COLORS.noon,
  night: HISTORY_SCOPE_COLORS.night
};
const MAIN_RING_COMPLETE_COLOR = "#79c9a0";
let habits = loadHabits();
let openedWrapper = null;
let isEditMode = false;
let reorderEnabled = false;

const appEl = document.querySelector(".app");
const listEl = document.getElementById("list");
const emptyHintEl = document.getElementById("emptyHint");
const dateEl = document.getElementById("date");
const streakEl = document.getElementById("streak");
const menuBtn = document.getElementById("menuBtn");
const headerMenuEl = document.getElementById("headerMenu");
const menuAppSettingsBtn = document.getElementById("menuAppSettingsBtn");
const menuExportBtn = document.getElementById("menuExportBtn");
const menuImportBtn = document.getElementById("menuImportBtn");
const editBtn = document.getElementById("editBtn");
const progressSliderEl = document.getElementById("progressSlider");
const progressRingEl = document.getElementById("progressRing");
const ringValueEl = document.getElementById("ringValue");
const progressPercentEl = document.getElementById("progressPercent");
const historyPathEl = document.getElementById("historyPath");
const historyDotsEl = document.getElementById("historyDots");
const historyLabelsEl = document.getElementById("historyLabels");
const historyDetailEl = document.getElementById("historyDetail");
const historyDetailDateEl = document.getElementById("historyDetailDate");
const historyDetailRateEl = document.getElementById("historyDetailRate");
const historyDetailListEl = document.getElementById("historyDetailList");
const historyEmptyEl = document.getElementById("historyEmpty");
const historyScopeSwitchEl = document.getElementById("historyScopeSwitch");
const historyScopeMetaEl = document.getElementById("historyScopeMeta");
const historyScopeNoteEl = document.getElementById("historyScopeNote");

const settingsNotificationNoteEl = document.getElementById("settingsNotificationNote");
const settingsModalSaveEl = document.getElementById("settingsModalSave");
const settingsModalCancelEl = document.getElementById("settingsModalCancel");

const RING_RADIUS = 52;
const RING_CIRCUMFERENCE = 2 * Math.PI * RING_RADIUS;
const APP_VERSION = "1.0.0";
let displayedRate = -1;
let selectedHistoryKey = "";
let currentProgressPage = 0;
let historyAnimationFrameId = null;
let currentHistoryPoints = null;

let onConfirmResolve = null;
let confirmModalConfig = {
  allowBackdropClose: true,
  allowEscapeClose: true
};
let lastTapTime = 0;
let lastTapX = 0;
let lastTapY = 0;
let calendarMode = "month";

let selectedHabitSlot = "morning";
let activeHistoryScope = "all";
let isHeaderMenuOpen = false;
let appSettings = { ...DEFAULT_APP_SETTINGS };
let isSettingsModalOpen = false;
let serviceWorkerRegistrationPromise = null;
const timeSlotButtons = Array.from(timeSlotSwitchEl.querySelectorAll(".time-slot-btn"));
const habitSlotButtons = Array.from(habitSlotPickerEl.querySelectorAll(".habit-slot-btn"));
const historyScopeButtons = Array.from(historyScopeSwitchEl.querySelectorAll(".history-scope-btn"));

ringValueEl.style.strokeDasharray = `${RING_CIRCUMFERENCE} ${RING_CIRCUMFERENCE}`;
ringValueEl.style.strokeDashoffset = `${RING_CIRCUMFERENCE}`;

dateEl.textContent = new Date().toLocaleDateString("ja-JP", {
  month: "long",
  day: "numeric",
  weekday: "short"
});

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
}

function normalizeTimeSlot(slot) {
  return TIME_SLOTS.some(s => s.id === slot) ? slot : "morning";
}

function normalizeHistoryScope(scope) {
  return HISTORY_SCOPES.includes(scope) ? scope : "all";
}

function createEmptyRateHistory() {
  return {
    all: {},
    morning: {},
    noon: {},
    night: {}
  };
}

function clampRate(rate) {
  return Math.max(0, Math.min(100, rate));
}

function setSelectedHabitSlot(slot) {
  selectedHabitSlot = normalizeTimeSlot(slot);
  habitSlotButtons.forEach(btn => {
    btn.classList.toggle("active", btn.dataset.slot === selectedHabitSlot);
  });
}

function setActiveTimeSlot(slot) {
  const nextSlot = normalizeTimeSlot(slot);
  if (activeTimeSlot === nextSlot) return;
  activeTimeSlot = nextSlot;
  timeSlotButtons.forEach(btn => {
    btn.classList.toggle("active", btn.dataset.slot === activeTimeSlot);
  });
  closeOpened();
  render();
}

function setActiveHistoryScope(scope, options = {}) {
  const { animate = true } = options;
  const nextScope = normalizeHistoryScope(scope);
  if (activeHistoryScope === nextScope) return;
  activeHistoryScope = nextScope;
  historyScopeButtons.forEach(b => {
    b.classList.toggle("active", (b.dataset.scope || "all") === activeHistoryScope);
  });
  if (isHistoryPageVisible()) {
    if (animate) {
      animateHistoryGraphTransition();
    } else {
      renderHistoryGraph();
    }
  }
}

function setHeaderMenuOpen(open) {
  isHeaderMenuOpen = !!open;
  headerMenuEl.classList.toggle("show", isHeaderMenuOpen);
  headerMenuEl.setAttribute("aria-hidden", isHeaderMenuOpen ? "false" : "true");
}

function openHabitModal(title, initialValue, onSave, initialSlot = activeTimeSlot) {
  onHabitModalSave = onSave;
  habitModalTitleEl.textContent = title;
  habitModalInputEl.value = initialValue || "";
  setSelectedHabitSlot(initialSlot);
  habitModalBackdropEl.classList.add("show");
  habitModalBackdropEl.setAttribute("aria-hidden", "false");
  setTimeout(() => {
    habitModalInputEl.focus();
    habitModalInputEl.select();
  }, 0);
}

function closeHabitModal() {
  habitModalInputEl.blur();
  habitModalBackdropEl.classList.remove("show");
  habitModalBackdropEl.setAttribute("aria-hidden", "true");
  onHabitModalSave = null;
}

function submitHabitModal() {
  if (typeof onHabitModalSave !== "function") {
    closeHabitModal();
    return;
  }
  const value = habitModalInputEl.value.trim();
  if (!value) return;
  onHabitModalSave(value, selectedHabitSlot);
  closeHabitModal();
}

function openConfirmModal({
  title = "確認",
  message = "",
  okText = "実行",
  cancelText = "キャンセル",

}) {

  };

  confirmModalBackdropEl.setAttribute("aria-hidden", "false");

    confirmModalOkEl.focus();
  }, 0);

  });
}

function closeConfirmModal(result) {

  confirmModalBackdropEl.setAttribute("aria-hidden", "true");
  if (typeof onConfirmResolve === "function") {
    onConfirmResolve(result);

  onConfirmResolve = null;
  confirmModalCancelEl.hidden = false;

    allowEscapeClose: true
  };
}

function safeParseJson(raw) {
  try {
    return JSON.parse(raw);
  } catch {
    return raw;
  }
}

function collectLocalStorageData() {
  const storageDump = {};
  for (let i = 0; i < localStorage.length; i += 1) {
    const key = localStorage.key(i);
    if (!key) continue;
    const raw = localStorage.getItem(key);
    storageDump[key] = safeParseJson(raw);
  }
  return storageDump;
}

function downloadJson(payload, filename) {
  const jsonText = JSON.stringify(payload, null, 2);
  const blob = new Blob([jsonText], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function exportLocalStorageAsJson() {
  const storageDump = collectLocalStorageData();
  const payload = {
    appVersion: APP_VERSION,
    exportDate: new Date().toISOString(),
    data: storageDump
  };
  const dateStamp = new Date().toISOString().slice(0, 10);
  downloadJson(payload, `habit-export-${dateStamp}.json`);
  void openConfirmModal({
    title: "エクスポート完了",
    message: "エクスポートが完了しました。",
    okText: "OK",
    showCancel: false,
    allowBackdropClose: false,
    allowEscapeClose: false
  });
}

function backupCurrentDataBeforeImport() {
  const payload = {
    appVersion: APP_VERSION,
    exportDate: new Date().toISOString(),
    backupReason: "before-import-overwrite",
    data: collectLocalStorageData()
  };
  const stamp = new Date().toISOString().replace(/[:.]/g, "-");
  downloadJson(payload, `habit-backup-before-import-${stamp}.json`);
}

function isPlainObject(value) {
  return !!value && typeof value === "object" && !Array.isArray(value);
}

function validateImportPayload(payload) {
  if (!isPlainObject(payload)) {
    return { ok: false, message: "JSONのトップレベルがオブジェクトではありません。" };
  }
  if (typeof payload.appVersion !== "string" || !payload.appVersion.trim()) {
    return { ok: false, message: "appVersion がありません。" };
  }
  if (typeof payload.exportDate !== "string" || Number.isNaN(Date.parse(payload.exportDate))) {
    return { ok: false, message: "exportDate が不正です。" };
  }
  if (!isPlainObject(payload.data)) {
    return { ok: false, message: "data がオブジェクトではありません。" };
  }
  return { ok: true, message: "" };
}

function applyImportedData(data) {
  APP_STORAGE_KEYS.forEach(key => localStorage.removeItem(key));
  Object.entries(data).forEach(([key, value]) => {
    if (typeof value === "string") {
      localStorage.setItem(key, value);
      return;
    }
    localStorage.setItem(key, JSON.stringify(value));
  });
}

async function handleImportPayload(payload) {
  const check = validateImportPayload(payload);
  if (!check.ok) {
    alert(`インポートエラー: ${check.message}`);
    return;
  }

  const shouldImport = await openConfirmModal({
    title: "インポート確認",
    message: `このデータを読み込みますか？\nappVersion: ${payload.appVersion}\nexportDate: ${payload.exportDate}\n現在のデータは上書きされます。`,
    okText: "読み込む",
    cancelText: "キャンセル"
  });
  if (!shouldImport) return;

  try {
    backupCurrentDataBeforeImport();
    applyImportedData(payload.data);
    habits = loadHabits();
    selectedHistoryKey = "";
    setEditMode(false);
    updateProgressDots();
    render();
    await openConfirmModal({
      title: "復元完了",
      message: "インポートが完了しました。",
      okText: "OK",
      showCancel: false,
      allowBackdropClose: false,
      allowEscapeClose: false
    });
  } catch (err) {
    alert(`インポートエラー: ${err instanceof Error ? err.message : "読み込みに失敗しました。"}`);
  }
}

function loadAppSettings() {

    };
  } catch {

}

function setNotificationTimeInputsEnabled(enabled) {

function loadNotificationSettings() {
  try {
    const raw = localStorage.getItem(NOTIFICATION_SETTINGS_KEY);
    if (!raw) return { ...DEFAULT_NOTIFICATION_SETTINGS };
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== "object") return { ...DEFAULT_NOTIFICATION_SETTINGS };
    return {
      enabled: !!parsed.enabled,
      morning: normalizeNotificationTime(parsed.morning, DEFAULT_NOTIFICATION_SETTINGS.morning),
      noon: normalizeNotificationTime(parsed.noon, DEFAULT_NOTIFICATION_SETTINGS.noon),
      night: normalizeNotificationTime(parsed.night, DEFAULT_NOTIFICATION_SETTINGS.night)
    };
  } catch {
    return { ...DEFAULT_NOTIFICATION_SETTINGS };
  }
}

function saveNotificationSettings(settings) {
  localStorage.setItem(NOTIFICATION_SETTINGS_KEY, JSON.stringify(settings));
}

function normalizeNotificationTime(value, fallback) {
  if (typeof value !== "string") return fallback;
  const trimmed = value.trim();
  if (!/^([01]\d|2[0-3]):([0-5]\d)$/.test(trimmed)) return fallback;
  return trimmed;
}

function hasWebNotificationApi() {
  return typeof window !== "undefined" && "Notification" in window;
}

function getNotificationRuntime() {
  return hasWebNotificationApi() ? "web" : "unsupported";
}

async function requestWebNotificationPermission() {
  if (!hasWebNotificationApi()) return "unsupported";
  if (Notification.permission === "granted") return "granted";
  const result = await Notification.requestPermission();
  return result;
}

function sendWebTestNotification() {
  if (!hasWebNotificationApi() || Notification.permission !== "granted") return;
  new Notification("習慣チェック", {
    body: "通知テストです。設定は保存されました。"
  });
}

function isWebPushSupported() {
  return typeof window !== "undefined"
    && window.isSecureContext
    && "serviceWorker" in navigator
    && "PushManager" in window;
}

function getPushClientId() {
  let clientId = localStorage.getItem(PUSH_CLIENT_ID_KEY) || "";
  if (!clientId && typeof crypto !== "undefined" && typeof crypto.randomUUID === "function") {
    clientId = crypto.randomUUID();
    localStorage.setItem(PUSH_CLIENT_ID_KEY, clientId);
  }
  return clientId;
}

function base64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; i += 1) {
    outputArray[i] = rawData.charCodeAt(i);
  }
  return outputArray;
}

function ensureServiceWorkerRegistration() {
  if (!("serviceWorker" in navigator)) {
    return Promise.reject(new Error("Service Worker が利用できません。"));
  }
  if (serviceWorkerRegistrationPromise) return serviceWorkerRegistrationPromise;
  serviceWorkerRegistrationPromise = navigator.serviceWorker.register("./service-worker.js");
  return serviceWorkerRegistrationPromise;
}

async function fetchPushPublicKey() {
  const res = await fetch("/api/push/public-key");
  if (!res.ok) {
    throw new Error("Push公開鍵の取得に失敗しました。サーバー設定を確認してください。");
  }
  const payload = await res.json();
  if (!payload || typeof payload.publicKey !== "string" || !payload.publicKey) {
    throw new Error("Push公開鍵の形式が不正です。");
  }
  return payload.publicKey;
}

async function postPushJson(url, body) {
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    let message = `${res.status} ${res.statusText}`;
    try {
      const data = await res.json();
      if (data && typeof data.error === "string" && data.error) {
        message = data.error;
      }
    } catch {
      // ignore json parse failure
    }
    throw new Error(message);
  }
  return res.json().catch(() => ({}));
}

async function upsertWebPushSubscription(settings, options = {}) {
  if (!isWebPushSupported()) {
    throw new Error("このブラウザはWeb Pushに対応していません。");
  }
  const registration = await ensureServiceWorkerRegistration();
  const publicKey = await fetchPushPublicKey();
  const keyBytes = base64ToUint8Array(publicKey);
  let subscription = await registration.pushManager.getSubscription();
  if (subscription && options.forceResubscribe) {
    await subscription.unsubscribe().catch(() => {});
    subscription = null;
  }
  if (!subscription) {
    subscription = await registration.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: keyBytes
    });
  }
  const clientId = getPushClientId();
  if (!clientId) {
    throw new Error("clientId を生成できませんでした。");
  }
  await postPushJson("/api/push/subscribe", {
    clientId,
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "Asia/Tokyo",
    settings,
    subscription: subscription.toJSON()
  });
}

function shouldRetryWebPushRegistration(err) {
  if (!(err instanceof Error)) return false;
  const message = (err.message || "").toLowerCase();
  return message.includes("subscription not found")
    || message.includes("410")
    || message.includes("404")
    || message.includes("403")
    || message.includes("401")
    || message.includes("unauthorized")
    || message.includes("forbidden")
    || message.includes("mismatch");
}

async function syncWebPushSubscription(settings) {
  await upsertWebPushSubscription(settings);
  try {
    await sendServerPushTest();
  } catch (err) {
    if (!shouldRetryWebPushRegistration(err)) {
      throw err;
    }
    await upsertWebPushSubscription(settings, { forceResubscribe: true });
    await sendServerPushTest();
  }
}

async function removeWebPushSubscription() {
  if (!isWebPushSupported()) return;
  const registration = await ensureServiceWorkerRegistration();
  const subscription = await registration.pushManager.getSubscription();
  if (subscription) {
    await subscription.unsubscribe();
  }
  const clientId = localStorage.getItem(PUSH_CLIENT_ID_KEY) || "";
  if (clientId) {
    try {
      await postPushJson("/api/push/unsubscribe", { clientId });
    } catch (err) {
      console.warn("購読解除の同期に失敗しました", err);
    }
  }
}

async function sendServerPushTest() {
  const clientId = localStorage.getItem(PUSH_CLIENT_ID_KEY) || "";
  if (!clientId) return;
  await postPushJson("/api/push/test", { clientId });
}

async function saveAppSettingsFromModal() {
  const currentApp = loadAppSettings();
  const currentNotification = loadNotificationSettings();
  const runtime = getNotificationRuntime();

  const nextApp = {
    defaultHistoryScope: normalizeHistoryScope(settingsHistoryScopeEl.value || currentApp.defaultHistoryScope),
    confirmBeforeDelete: settingsConfirmDeleteEl.checked
  };
  appSettings = nextApp;
  saveAppSettings(nextApp);
  setActiveHistoryScope(nextApp.defaultHistoryScope, { animate: false });

  const nextNotification = {
    enabled: runtime !== "unsupported" ? !!settingsNotificationEnabledEl.checked : false,
    morning: normalizeNotificationTime(settingsNotifyMorningEl.value, currentNotification.morning),
    noon: normalizeNotificationTime(settingsNotifyNoonEl.value, currentNotification.noon),
    night: normalizeNotificationTime(settingsNotifyNightEl.value, currentNotification.night)
  };
  saveNotificationSettings(nextNotification);

  let notificationMessage = `通知: ${nextNotification.enabled ? "ON" : "OFF"}`;
  if (runtime === "web") {
    if (!nextNotification.enabled) {
      await removeWebPushSubscription();
    } else {
      const permission = await requestWebNotificationPermission();
      if (permission !== "granted") {
        notificationMessage = "通知: 保存済み（ブラウザ通知の許可が必要です）";
      } else if (isWebPushSupported()) {
        try {
          await syncWebPushSubscription(nextNotification);
          notificationMessage = `通知: ON（サーバー連携済み / 朝 ${nextNotification.morning} / 昼 ${nextNotification.noon} / 夜 ${nextNotification.night}）`;
        } catch (err) {
          console.error("Push連携エラー", err);
          notificationMessage = `通知: 保存済み（Push連携エラー: ${err instanceof Error ? err.message : "unknown"}）`;
        }
      } else {
        sendWebTestNotification();
        notificationMessage = `通知: ON（テスト通知のみ。Web Push非対応）`;
      }
    }
  } else if (runtime === "unsupported") {
    notificationMessage = "通知: この環境では利用できません";
  }

  closeAppSettingsModal();
  await openConfirmModal({
    title: "アプリ設定",
    message: `保存しました。\n履歴表示: ${nextApp.defaultHistoryScope}\n削除前確認: ${nextApp.confirmBeforeDelete ? "ON" : "OFF"}\n${notificationMessage}`,
    okText: "OK",
    showCancel: false
  });
}

function loadHabits() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return [];
    return parsed
      .map(item => {
        if (!item || typeof item !== "object") return null;
        const text = typeof item.text === "string" ? item.text.trim() : "";
        if (!text) return null;
        return {
          text,
          done: !!item.done,
          slot: normalizeTimeSlot(item.slot)
        };
      })
      .filter(Boolean);
  } catch (err) {
    console.warn("habits の読み込みに失敗したため初期化します", err);
    localStorage.removeItem(STORAGE_KEY);
    return [];
  }
}

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
}

function parseDateKey(key) {
  if (!key) return null;
  const parts = key.split("-").map(Number);
  if (parts.length !== 3 || parts.some(Number.isNaN)) return null;
  return new Date(parts[0], parts[1] - 1, parts[2]);
}

function getPrevDateKey(key) {
  const d = parseDateKey(key);
  if (!d) return "";
  d.setDate(d.getDate() - 1);
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
}

function getDateKeyFromDate(date) {
  return `${date.getFullYear()}-${date.getMonth() + 1}-${date.getDate()}`;
}

function resolveDailyRate(dateKey, history, snapshots) {
  const historyRate = Number(history[dateKey]);
  if (Number.isFinite(historyRate)) {
    return clampRate(historyRate);
  }
  const snapshotRate = Number((snapshots[dateKey] && snapshots[dateKey].rate) ?? NaN);
  if (Number.isFinite(snapshotRate)) {
    return clampRate(snapshotRate);
  }
  return null;
}

function resolveScopedHistoryRate(historyByScope, dateKey, scope) {
  const normalizedScope = normalizeHistoryScope(scope);
  const scopedRate = Number((historyByScope[normalizedScope] || {})[dateKey]);
  if (Number.isFinite(scopedRate)) {
    return { rate: clampRate(scopedRate), source: "scope" };
  }
  const allRate = Number((historyByScope.all || {})[dateKey]);
  if (normalizedScope !== "all" && Number.isFinite(allRate)) {
    return { rate: clampRate(allRate), source: "fallback-all" };
  }
  return { rate: 0, source: "none" };
}

function renderCalendarMonth(history, snapshots) {
  const year = calendarCursorDate.getFullYear();
  const month = calendarCursorDate.getMonth();
  calendarPeriodLabelEl.textContent = `${year}年${month + 1}月`;
  calendarContentEl.innerHTML = "";

  const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
  const weekdayRow = document.createElement("div");
  weekdayRow.className = "calendar-weekdays";
  weekdayRow.innerHTML = weekdays.map(label => `<div class="calendar-weekday">${label}</div>`).join("");

  const grid = document.createElement("div");
  grid.className = "calendar-grid";
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayKey = getTodayKey();
  let hasData = false;

  for (let i = 0; i < firstDay; i += 1) {
    const empty = document.createElement("div");
    empty.className = "calendar-day empty";
    grid.appendChild(empty);
  }

  for (let day = 1; day <= daysInMonth; day += 1) {
    const d = new Date(year, month, day);
    const dateKey = getDateKeyFromDate(d);
    const rate = resolveDailyRate(dateKey, history, snapshots);
    const dayEl = document.createElement("div");
    dayEl.className = "calendar-day";
    if (rate !== null) {
      hasData = true;
      if (rate >= 80) {
        dayEl.dataset.level = "high";
      } else if (rate > 0) {
        dayEl.dataset.level = "mid";
      }
    }
    if (dateKey === todayKey) {
      dayEl.classList.add("today");
    }
    dayEl.innerHTML = `
      <div class="calendar-day-num">${day}</div>
      <div class="calendar-day-rate">${rate === null ? "-" : `${rate}%`}</div>
    `;
    grid.appendChild(dayEl);
  }

  calendarContentEl.appendChild(weekdayRow);
  calendarContentEl.appendChild(grid);
  if (!hasData) {
    const emptyText = document.createElement("div");
    emptyText.className = "calendar-empty";
    emptyText.textContent = "この月の記録はまだありません";
    calendarContentEl.appendChild(emptyText);
  }
}

function renderCalendarYear(history, snapshots) {
  const year = calendarCursorDate.getFullYear();
  calendarPeriodLabelEl.textContent = `${year}年`;
  calendarContentEl.innerHTML = "";

  const monthsJa = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
  const grid = document.createElement("div");
  grid.className = "calendar-year-grid";
  let hasData = false;

  for (let month = 0; month < 12; month += 1) {
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    let total = 0;
    let count = 0;
    let perfect = 0;

    for (let day = 1; day <= daysInMonth; day += 1) {
      const key = getDateKeyFromDate(new Date(year, month, day));
      const rate = resolveDailyRate(key, history, snapshots);
      if (rate === null) continue;
      total += rate;
      count += 1;
      if (rate === 100) perfect += 1;
    }

    if (count > 0) hasData = true;
    const avg = count > 0 ? Math.round(total / count) : null;
    const ringRadius = 14;
    const ringCircumference = 2 * Math.PI * ringRadius;
    const ringRatio = avg === null ? 0 : Math.max(0, Math.min(1, avg / 100));
    const ringDashOffset = ringCircumference * (1 - ringRatio);
    const card = document.createElement("div");
    card.className = "calendar-month-card";
    card.innerHTML = `
      <div class="calendar-month-head">
        <div>
          <div class="calendar-month-name">${monthsJa[month]}</div>
          <div class="calendar-month-value">${avg === null ? "-" : `${avg}%`}</div>
        </div>
        <div class="calendar-month-ring">
          <svg viewBox="0 0 40 40" aria-hidden="true">
            <circle class="calendar-month-ring-track" cx="20" cy="20" r="${ringRadius}"></circle>
            <circle
              class="calendar-month-ring-value ${avg === 100 ? "complete" : ""}"
              cx="20"
              cy="20"
              r="${ringRadius}"
              stroke-dasharray="${ringCircumference} ${ringCircumference}"
              stroke-dashoffset="${ringDashOffset}"
            ></circle>
          </svg>
        </div>
      </div>
      <div class="calendar-month-sub">記録日 ${count}日 / 100%達成 ${perfect}日</div>
    `;
    grid.appendChild(card);
  }

  calendarContentEl.appendChild(grid);
  if (!hasData) {
    const emptyText = document.createElement("div");
    emptyText.className = "calendar-empty";
    emptyText.textContent = "この年の記録はまだありません";
    calendarContentEl.appendChild(emptyText);
  }
}

function closeCalendarModal() {

function getStoredStreakCount() {
  const raw = localStorage.getItem(STREAK_COUNT_KEY);
  const count = Number.parseInt(raw || "0", 10);
  return Number.isNaN(count) ? 0 : Math.max(0, count);
}

function loadRateHistory() {
  const empty = createEmptyRateHistory();
  try {
    const raw = localStorage.getItem(RATE_HISTORY_KEY);
    if (!raw) return empty;
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
      return empty;
    }
    const hasScopedKeys = HISTORY_SCOPES.some(scope => scope in parsed);
    if (!hasScopedKeys) {
      // Backward compatibility: old format { "YYYY-M-D": rate }
      return {
        ...empty,
        all: parsed
      };
    }
    return {
      all: parsed.all && typeof parsed.all === "object" ? parsed.all : {},
      morning: parsed.morning && typeof parsed.morning === "object" ? parsed.morning : {},
      noon: parsed.noon && typeof parsed.noon === "object" ? parsed.noon : {},
      night: parsed.night && typeof parsed.night === "object" ? parsed.night : {}
    };
  } catch (err) {
    localStorage.removeItem(RATE_HISTORY_KEY);
    return empty;
  }
}

function saveRateHistory(history) {
  const pruned = createEmptyRateHistory();
  HISTORY_SCOPES.forEach(scope => {
    const scopedHistory = history[scope] && typeof history[scope] === "object" ? history[scope] : {};
    pruned[scope] = { ...scopedHistory };
  });
  const now = new Date();
  const oldest = new Date(now);
  oldest.setDate(oldest.getDate() - 35);
  const oldestTime = oldest.getTime();
  HISTORY_SCOPES.forEach(scope => {
    Object.keys(pruned[scope]).forEach(key => {
      const date = parseDateKey(key);
      if (!date || date.getTime() < oldestTime) {
        delete pruned[scope][key];
      }
    });
  });
  localStorage.setItem(RATE_HISTORY_KEY, JSON.stringify(pruned));
}

function writeDailyRateHistory(dateKey, rate, scope = "all") {
  if (!dateKey) return;
  const history = loadRateHistory();
  const scoped = normalizeHistoryScope(scope);
  history[scoped][dateKey] = clampRate(rate);
  saveRateHistory(history);
}

function loadDailySnapshots() {
  try {
    const raw = localStorage.getItem(DAILY_SNAPSHOT_KEY);
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    return parsed && typeof parsed === "object" ? parsed : {};
  } catch (err) {
    localStorage.removeItem(DAILY_SNAPSHOT_KEY);
    return {};
  }
}

function saveDailySnapshots(allSnapshots) {
  const pruned = { ...allSnapshots };
  const now = new Date();
  const oldest = new Date(now);
  oldest.setDate(oldest.getDate() - 35);
  const oldestTime = oldest.getTime();
  Object.keys(pruned).forEach(key => {
    const date = parseDateKey(key);
    if (!date || date.getTime() < oldestTime) {
      delete pruned[key];
    }
  });
  localStorage.setItem(DAILY_SNAPSHOT_KEY, JSON.stringify(pruned));
}

function buildSnapshotFromHabits(rate) {
  return {
    rate,
    habits: habits.map(h => ({
      text: h.text,
      done: !!h.done,
      slot: normalizeTimeSlot(h.slot)
    }))
  };
}

function writeDailySnapshot(dateKey, rate) {
  if (!dateKey) return;
  const snapshots = loadDailySnapshots();
  snapshots[dateKey] = buildSnapshotFromHabits(rate);
  saveDailySnapshots(snapshots);
}

function getRecent7Days() {
  const out = [];
  const today = new Date();
  for (let i = 6; i >= 0; i -= 1) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const key = `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
    const label = d.toLocaleDateString("ja-JP", { weekday: "short" });
    out.push({ key, label });
  }
  return out;
}

function buildSmoothPath(points) {
  if (points.length === 0) return "";
  if (points.length === 1) return `M ${points[0].x} ${points[0].y}`;
  if (points.length === 2) {
    return `M ${points[0].x} ${points[0].y} L ${points[1].x} ${points[1].y}`;
  }

  const n = points.length;
  const secants = new Array(n - 1);
  const tangents = new Array(n);

  for (let i = 0; i < n - 1; i += 1) {
    const dx = points[i + 1].x - points[i].x;
    secants[i] = dx === 0 ? 0 : (points[i + 1].y - points[i].y) / dx;
  }

  tangents[0] = secants[0];
  tangents[n - 1] = secants[n - 2];
  for (let i = 1; i < n - 1; i += 1) {
    const prev = secants[i - 1];
    const next = secants[i];
    tangents[i] = prev * next <= 0 ? 0 : (prev + next) / 2;
  }

  for (let i = 0; i < n - 1; i += 1) {
    const slope = secants[i];
    if (slope === 0) {
      tangents[i] = 0;
      tangents[i + 1] = 0;
      continue;
    }
    const a = tangents[i] / slope;
    const b = tangents[i + 1] / slope;
    const norm = Math.hypot(a, b);
    if (norm > 3) {
      const scale = 3 / norm;
      tangents[i] = scale * a * slope;
      tangents[i + 1] = scale * b * slope;
    }
  }

  let d = `M ${points[0].x} ${points[0].y}`;
  for (let i = 0; i < n - 1; i += 1) {
    const p0 = points[i];
    const p1 = points[i + 1];
    const dx = p1.x - p0.x;
    const c1x = p0.x + dx / 3;
    const c1y = p0.y + (tangents[i] * dx) / 3;
    const c2x = p1.x - dx / 3;
    const c2y = p1.y - (tangents[i + 1] * dx) / 3;
    d += ` C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p1.x} ${p1.y}`;
  }
  return d;
}

function getHistoryChartData() {
  const historyByScope = loadRateHistory();
  const snapshots = loadDailySnapshots();
  const days = getRecent7Days();
  const minX = 16;
  const maxX = 264;
  const minY = 12;
  const maxY = 100;
  const stepX = (maxX - minX) / 6;
  let scopeDataDays = 0;
  let fallbackDays = 0;
  const points = days.map((day, i) => {
    const resolved = resolveScopedHistoryRate(historyByScope, day.key, activeHistoryScope);
    const normalized = clampRate(resolved.rate) / 100;
    const x = minX + stepX * i;
    const y = maxY - normalized * (maxY - minY);
    if (activeHistoryScope !== "all") {
      if (resolved.source === "scope") scopeDataDays += 1;
      if (resolved.source === "fallback-all") fallbackDays += 1;
    }
    return { x, y, rate: resolved.rate, source: resolved.source };
  });
  return { historyByScope, snapshots, days, points, maxY, scopeDataDays, fallbackDays };
}

function paintHistoryGraph(days, points, historyByScope, snapshots, scopeDataDays, fallbackDays) {
  historyPathEl.setAttribute("d", buildSmoothPath(points));
  historyPathEl.style.stroke = HISTORY_SCOPE_COLORS[activeHistoryScope] || HISTORY_SCOPE_COLORS.all;
  historyDotsEl.innerHTML = "";
  historyScopeMetaEl.textContent = "";
  if (activeHistoryScope === "all") {
    historyScopeMetaEl.textContent = "全体の達成率";
  } else {
    historyScopeMetaEl.textContent = `時間帯別データ ${scopeDataDays}/7日` + (fallbackDays > 0 ? `（未対応 ${fallbackDays}日）` : "");
  }
  points.forEach((p, i) => {
    const day = days[i];
    const hit = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    hit.setAttribute("cx", String(p.x));
    hit.setAttribute("cy", String(p.y));
    hit.setAttribute("r", "12");
    hit.classList.add("dot-hit");

    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    circle.setAttribute("cx", String(p.x));
    circle.setAttribute("cy", String(p.y));
    circle.setAttribute("r", selectedHistoryKey === day.key ? "4.6" : "3.2");
    circle.style.fill = HISTORY_SCOPE_COLORS[activeHistoryScope] || HISTORY_SCOPE_COLORS.all;
    if (p.source === "fallback-all") {
      circle.classList.add("fallback");
    }
    if (selectedHistoryKey === day.key) {
      circle.classList.add("active");
    }
    hit.addEventListener("click", () => {
      selectedHistoryKey = selectedHistoryKey === day.key ? "" : day.key;
      renderHistoryGraph();
    });
    historyDotsEl.appendChild(hit);
    historyDotsEl.appendChild(circle);
  });
  historyLabelsEl.innerHTML = days.map(day => `<span>${day.label}</span>`).join("");
  currentHistoryPoints = points.map(p => ({ ...p }));

  if (!selectedHistoryKey) {
    historyDetailEl.hidden = true;
    historyDetailListEl.innerHTML = "";
    historyEmptyEl.hidden = true;
    historyScopeNoteEl.hidden = fallbackDays === 0 || activeHistoryScope === "all";
    return;
  }

  historyDetailEl.hidden = false;
  const selectedDay = days.find(day => day.key === selectedHistoryKey) || days[days.length - 1];
  const selectedSnapshot = snapshots[selectedDay.key];
  const selectedRateInfo = resolveScopedHistoryRate(historyByScope, selectedDay.key, activeHistoryScope);
  const selectedRate = selectedRateInfo.rate;
  historyDetailDateEl.textContent = selectedDay.key;
  historyDetailRateEl.textContent = `${selectedRate}%`;
  historyScopeNoteEl.hidden = !(activeHistoryScope !== "all" && fallbackDays > 0);
  historyDetailListEl.innerHTML = "";

  if (!selectedSnapshot || !Array.isArray(selectedSnapshot.habits) || selectedSnapshot.habits.length === 0) {
    historyEmptyEl.hidden = false;
    return;
  }

  const snapshotHasSlotData = selectedSnapshot.habits.some(item => typeof item.slot === "string");
  const targetHabits = activeHistoryScope === "all"
    ? selectedSnapshot.habits
    : !snapshotHasSlotData
      ? []
    : selectedSnapshot.habits.filter(item => normalizeTimeSlot(item.slot) === activeHistoryScope);

  if (targetHabits.length === 0) {
    historyEmptyEl.hidden = false;
    if (activeHistoryScope !== "all" && !snapshotHasSlotData) {
      historyScopeNoteEl.hidden = false;
    }
    return;
  }

  historyEmptyEl.hidden = true;
  targetHabits.forEach(item => {
    const slotMeta = TIME_SLOTS.find(s => s.id === item.slot);
    const li = document.createElement("li");
    li.className = "history-detail-item";
    const dot = document.createElement("span");
    dot.className = `status-dot ${item.done ? "done" : "todo"}`;
    const slot = document.createElement("span");
    slot.className = "history-slot-badge";
    slot.textContent = slotMeta ? slotMeta.label : "-";
    const text = document.createElement("span");
    text.textContent = item.text;
    li.appendChild(dot);
    li.appendChild(slot);
    li.appendChild(text);
    historyDetailListEl.appendChild(li);
  });
}

function renderHistoryGraph() {
  const { historyByScope, snapshots, days, points, scopeDataDays, fallbackDays } = getHistoryChartData();
  paintHistoryGraph(days, points, historyByScope, snapshots, scopeDataDays, fallbackDays);
}

function animateHistoryGraphTransition() {
  const { historyByScope, snapshots, days, points: targetPoints, scopeDataDays, fallbackDays } = getHistoryChartData();
  if (historyAnimationFrameId) {
    cancelAnimationFrame(historyAnimationFrameId);
    historyAnimationFrameId = null;
  }

  const hasBase =
    Array.isArray(currentHistoryPoints) &&
    currentHistoryPoints.length === targetPoints.length;
  const basePoints = hasBase
    ? currentHistoryPoints.map(p => ({ ...p }))
    : targetPoints.map(p => ({ ...p }));

  const delayPerPointMs = 30;
  const pointDurationMs = 220;
  const totalDurationMs = pointDurationMs + delayPerPointMs * (targetPoints.length - 1);
  let startTime = 0;

  const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
  const frame = now => {
    if (!startTime) startTime = now;
    const elapsed = now - startTime;
    const animatedPoints = targetPoints.map((target, i) => {
      const base = basePoints[i];
      const local = Math.max(0, Math.min(1, (elapsed - i * delayPerPointMs) / pointDurationMs));
      const eased = easeOutCubic(local);
      const goingUp = target.y < base.y;
      const overshoot = goingUp ? Math.sin(Math.PI * local) * 2.8 : 0;
      return {
        ...target,
        y: base.y + (target.y - base.y) * eased - overshoot
      };
    });

    paintHistoryGraph(days, animatedPoints, historyByScope, snapshots, scopeDataDays, fallbackDays);

    if (elapsed < totalDurationMs) {
      historyAnimationFrameId = requestAnimationFrame(frame);
    } else {
      historyAnimationFrameId = null;
      paintHistoryGraph(days, targetPoints, historyByScope, snapshots, scopeDataDays, fallbackDays);
    }
  };

  historyAnimationFrameId = requestAnimationFrame(frame);
}

function animateHistoryGraphFromZero() {
  const { historyByScope, snapshots, days, points: targetPoints, maxY, scopeDataDays, fallbackDays } = getHistoryChartData();
  if (historyAnimationFrameId) {
    cancelAnimationFrame(historyAnimationFrameId);
    historyAnimationFrameId = null;
  }

  const delayPerPointMs = 55;
  const pointDurationMs = 300;
  const totalDurationMs = pointDurationMs + delayPerPointMs * (targetPoints.length - 1);
  let startTime = 0;

  const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
  const frame = now => {
    if (!startTime) startTime = now;
    const elapsed = now - startTime;
    const animatedPoints = targetPoints.map((target, i) => {
      const local = Math.max(0, Math.min(1, (elapsed - i * delayPerPointMs) / pointDurationMs));
      const eased = easeOutCubic(local);
      return {
        ...target,
        y: maxY + (target.y - maxY) * eased
      };
    });

    paintHistoryGraph(days, animatedPoints, historyByScope, snapshots, scopeDataDays, fallbackDays);

    if (elapsed < totalDurationMs) {
      historyAnimationFrameId = requestAnimationFrame(frame);
    } else {
      historyAnimationFrameId = null;
      paintHistoryGraph(days, targetPoints, historyByScope, snapshots, scopeDataDays, fallbackDays);
    }
  };

  historyAnimationFrameId = requestAnimationFrame(frame);
}

function isHistoryPageVisible() {
  const pageWidth = progressSliderEl.clientWidth || 1;
  return progressSliderEl.scrollLeft > pageWidth * 0.2;
}

function moveToProgressPage(page) {
  const pageWidth = progressSliderEl.clientWidth || 1;
  const targetPage = page >= 1 ? 1 : 0;
  progressSliderEl.scrollTo({
    left: pageWidth * targetPage,
    behavior: "smooth"
  });
}

function updateProgressDots() {
  const pageWidth = progressSliderEl.clientWidth || 1;
  const page = progressSliderEl.scrollLeft >= pageWidth / 2 ? 1 : 0;
  progressDotRingEl.classList.toggle("active", page === 0);
  progressDotHistoryEl.classList.toggle("active", page === 1);

  if (page !== currentProgressPage) {
    if (page === 1) {
      animateHistoryGraphFromZero();
    } else {
      if (historyAnimationFrameId) {
        cancelAnimationFrame(historyAnimationFrameId);
        historyAnimationFrameId = null;
      }
      if (selectedHistoryKey) {
        selectedHistoryKey = "";
      }
      renderHistoryGraph();
    }
    currentProgressPage = page;
  }
}

function setStoredStreak(count, lastDate) {
  localStorage.setItem(STREAK_COUNT_KEY, String(Math.max(0, count)));
  localStorage.setItem(STREAK_LAST_DATE_KEY, lastDate || "");
}

function isPerfectDay() {
  return habits.length > 0 && habits.every(h => h.done);
}

function updateStreakDisplay() {
  if (!isPerfectDay()) {
    streakEl.textContent = "";
    streakEl.classList.remove("show");
    return;
  }

  const todayKey = getTodayKey();
  const storedCount = getStoredStreakCount();
  const storedLastDate = localStorage.getItem(STREAK_LAST_DATE_KEY) || "";
  const expectedPrev = getPrevDateKey(todayKey);
  const displayCount = storedLastDate === expectedPrev ? storedCount + 1 : 1;
  if (displayCount < 2) {
    streakEl.textContent = "";
    streakEl.classList.remove("show");
    return;
  }
  streakEl.textContent = `${displayCount}日連続達成中`;
  streakEl.classList.add("show");
}

function resetHabitsIfNewDay() {
  const todayKey = getTodayKey();
  const lastDate = localStorage.getItem(DATE_KEY);
  if (lastDate === todayKey) return false;

  if (lastDate) {
    const done = habits.filter(h => h.done).length;
    const total = habits.length;
    const lastRate = total === 0 ? 0 : Math.round(done / total * 100);
    writeDailyRateHistory(lastDate, lastRate, "all");
    TIME_SLOTS.forEach(slot => {
      const scopedHabits = habits.filter(h => normalizeTimeSlot(h.slot) === slot.id);
      const scopedDone = scopedHabits.filter(h => h.done).length;
      const scopedTotal = scopedHabits.length;
      const scopedRate = scopedTotal === 0 ? 0 : Math.round(scopedDone / scopedTotal * 100);
      writeDailyRateHistory(lastDate, scopedRate, slot.id);
    });
    writeDailySnapshot(lastDate, lastRate);

    const yesterdayKey = getPrevDateKey(todayKey);
    const isContinuousDay = lastDate === yesterdayKey;
    const wasPerfect = isPerfectDay();
    const storedCount = getStoredStreakCount();
    const storedLastDate = localStorage.getItem(STREAK_LAST_DATE_KEY) || "";
    if (!isContinuousDay) {
      setStoredStreak(0, "");
    } else if (wasPerfect) {
      const expectedPrev = getPrevDateKey(lastDate);
      const nextCount = storedLastDate === expectedPrev ? storedCount + 1 : 1;
      setStoredStreak(nextCount, lastDate);
    } else {
      setStoredStreak(0, "");
    }
  }

  habits.forEach(h => {
    h.done = false;
  });
  save();
  localStorage.setItem(DATE_KEY, todayKey);
  return true;
}

function moveHabit(fromIndex, toIndex) {
  if (fromIndex === toIndex) return;
  const [moved] = habits.splice(fromIndex, 1);
  habits.splice(toIndex, 0, moved);
}

function setEditMode(enabled) {
  isEditMode = enabled;
  reorderEnabled = enabled;
  appEl.classList.toggle("edit-mode", enabled);
  editBtn.textContent = enabled ? "完了" : "編集";
  closeOpened();
}

function updateRate() {
  const visibleHabits = habits.filter(h => normalizeTimeSlot(h.slot) === activeTimeSlot);
  const total = visibleHabits.length;
  const done = visibleHabits.filter(h => h.done).length;
  const rate = total === 0 ? 0 : Math.round(done / total * 100);
  const totalAll = habits.length;
  const doneAll = habits.filter(h => h.done).length;
  const totalRateAll = totalAll === 0 ? 0 : Math.round(doneAll / totalAll * 100);
  const prevRate = displayedRate;
  writeDailyRateHistory(getTodayKey(), totalRateAll, "all");
  TIME_SLOTS.forEach(slot => {
    const scopedHabits = habits.filter(h => normalizeTimeSlot(h.slot) === slot.id);
    const scopedDone = scopedHabits.filter(h => h.done).length;
    const scopedTotal = scopedHabits.length;
    const scopedRate = scopedTotal === 0 ? 0 : Math.round(scopedDone / scopedTotal * 100);
    writeDailyRateHistory(getTodayKey(), scopedRate, slot.id);
  });
  writeDailySnapshot(getTodayKey(), totalRateAll);

  progressPercentEl.textContent = `${rate}%`;

  const ratio = Math.max(0, Math.min(1, rate / 100));
  const dashOffset = RING_CIRCUMFERENCE * (1 - ratio);
  ringValueEl.style.strokeDashoffset = `${dashOffset}`;
  ringValueEl.classList.toggle("complete", rate === 100);
  ringValueEl.style.stroke = rate === 100
    ? MAIN_RING_COMPLETE_COLOR
    : (MAIN_RING_SLOT_COLORS[activeTimeSlot] || MAIN_RING_SLOT_COLORS.noon);

  if (rate > displayedRate) {
    progressRingEl.classList.remove("animate");
    void progressRingEl.offsetWidth;
    progressRingEl.classList.add("animate");
  }
  displayedRate = rate;
  if (isHistoryPageVisible() && rate !== prevRate) {
    animateHistoryGraphTransition();
  } else {
    renderHistoryGraph();
  }

  updateStreakDisplay();
}

function closeOpened() {
  if (openedWrapper) {
    openedWrapper.classList.remove("swiped");
    openedWrapper = null;
  }
}

function render() {
  listEl.innerHTML = "";
  openedWrapper = null;
  let renderedCount = 0;

  const visibleHabits = habits
    .map((habit, index) => ({ habit, index }))
    .filter(entry => normalizeTimeSlot(entry.habit.slot) === activeTimeSlot);

  visibleHabits.forEach((entry, visibleIndex) => {
    const { habit, index } = entry;
    const wrapper = document.createElement("div");
    wrapper.className = "swipe-wrapper";

    const deleteArea = document.createElement("div");
    deleteArea.className = "delete-area";
    deleteArea.textContent = "削除";
    deleteArea.addEventListener("click", async () => {
      if (!isEditMode) return;
      if (appSettings.confirmBeforeDelete) {
        const ok = await openConfirmModal({
          title: "削除確認",
          message: "この習慣を削除しますか？",
          okText: "削除",
          cancelText: "キャンセル"
        });
        if (!ok) return;
      }
      habits.splice(index, 1);
      save();
      render();
    });

    const item = document.createElement("div");
    item.className = "item";
    if (habit.done) item.classList.add("done");

    const dragHandle = document.createElement("div");
    dragHandle.className = "drag-handle";
    dragHandle.textContent = "≡";

    const text = document.createElement("div");
    text.className = "text";
    text.textContent = habit.text;

    const editItemBtn = document.createElement("button");
    editItemBtn.className = "edit-item-btn";
    editItemBtn.textContent = "編集";
    editItemBtn.addEventListener("click", e => {
      e.stopPropagation();
      if (!isEditMode) return;
      openHabitModal("習慣を編集", habit.text, (value, slot) => {
        habits[index].text = value;
        habits[index].slot = slot;
        save();
        render();
      }, habit.slot);
    });

    const checkArea = document.createElement("div");
    checkArea.className = "check-area";

    const check = document.createElement("div");
    check.className = "check";
    check.textContent = "✓";

    checkArea.appendChild(check);

    let startX = 0;
    let startY = 0;
    let deltaX = 0;
    let isSwipeGesture = false;
    let movedDuringTouch = false;
    let isDragging = false;
    let activePointerId = null;
    let dragStartY = 0;
    let dragFromIndex = visibleIndex;
    let dragToIndex = visibleIndex;
    let dragWrapperRefs = [];
    let dragMidPoints = [];
    let dragShiftAmount = 0;
    const dragGap = 8;

    const clearDragPreview = () => {
      dragWrapperRefs.forEach(w => {
        w.style.transform = "";
      });
    };

    const applyDragPreview = () => {
      clearDragPreview();
      if (!isDragging) return;
      if (dragToIndex > dragFromIndex) {
        for (let i = dragFromIndex + 1; i <= dragToIndex; i += 1) {
          dragWrapperRefs[i].style.transform = `translateY(${-dragShiftAmount}px)`;
        }
      } else if (dragToIndex < dragFromIndex) {
        for (let i = dragToIndex; i < dragFromIndex; i += 1) {
          dragWrapperRefs[i].style.transform = `translateY(${dragShiftAmount}px)`;
        }
      }
    };

    const resolveDropIndex = draggedCenterY => {
      let nextIndex = 0;
      for (let i = 0; i < dragMidPoints.length; i += 1) {
        if (draggedCenterY > dragMidPoints[i]) {
          nextIndex = i + 1;
        }
      }
      if (nextIndex > dragFromIndex) nextIndex -= 1;
      return Math.max(0, Math.min(visibleHabits.length - 1, nextIndex));
    };

    item.addEventListener("touchstart", e => {
      closeOpened();
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      deltaX = 0;
      isSwipeGesture = false;
      movedDuringTouch = false;
    });

    item.addEventListener("touchmove", e => {
      const touchX = e.touches[0].clientX;
      const touchY = e.touches[0].clientY;
      const dx = touchX - startX;
      const dy = touchY - startY;

      if (!isEditMode) {
        if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
          movedDuringTouch = true;
        }
        return;
      }

      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) {
        isSwipeGesture = true;
        deltaX = dx;
        item.style.transform = `translateX(${Math.min(0, Math.max(dx, -72))}px)`;
      }
    }, { passive: false });

   item.addEventListener("touchend", () => {
  if (isEditMode) {
    item.style.transform = "";
    if (isSwipeGesture) {
      if (deltaX < -40) {
        wrapper.classList.add("swiped");
        openedWrapper = wrapper;
      } else {
        wrapper.classList.remove("swiped");
      }
    }
    return;
  }

  item.style.transform = "";
  if (movedDuringTouch) return;

  const wasDone = habits[index].done;
  habits[index].done = !habits[index].done;

  // 完了 -> 未完了
  if (wasDone) {
    save();
    render();
    return;
  }

  // 未完了 -> 完了（演出）
  item.classList.add("just-done");
  item.classList.add("done");
  setTimeout(() => {
    item.classList.remove("just-done");
    save();
    render();
  }, 300);
});

    dragHandle.addEventListener("pointerdown", e => {
      if (!reorderEnabled) return;
      e.preventDefault();
      closeOpened();
      isDragging = true;
      activePointerId = e.pointerId;
      dragStartY = e.clientY;
      dragFromIndex = visibleIndex;
      dragToIndex = visibleIndex;
      dragWrapperRefs = Array.from(listEl.querySelectorAll(".swipe-wrapper"));
      dragMidPoints = dragWrapperRefs.map(w => {
        const rect = w.getBoundingClientRect();
        return rect.top + rect.height / 2;
      });
      dragShiftAmount = wrapper.offsetHeight + dragGap;
      wrapper.classList.add("drag-source");
      item.classList.add("dragging");
      item.style.transform = "translateY(0)";
      dragHandle.setPointerCapture(e.pointerId);
    });

    dragHandle.addEventListener("pointermove", e => {
      if (!isDragging || e.pointerId !== activePointerId) return;
      e.preventDefault();
      const translateY = e.clientY - dragStartY;
      item.style.transform = `translateY(${translateY}px)`;
      const sourceRect = wrapper.getBoundingClientRect();
      const draggedCenterY = sourceRect.top + sourceRect.height / 2 + translateY;
      const nextDragToIndex = resolveDropIndex(draggedCenterY);
      dragToIndex = nextDragToIndex;
      applyDragPreview();
    });

    const finishDrag = e => {
      if (!isDragging || e.pointerId !== activePointerId) return;
      isDragging = false;
      activePointerId = null;
      item.style.transform = "";
      clearDragPreview();
      wrapper.classList.remove("drag-source");
      item.classList.remove("dragging");
      if (dragToIndex !== dragFromIndex) {
        const fromActualIndex = visibleHabits[dragFromIndex].index;
        const toActualIndex = visibleHabits[dragToIndex].index;
        moveHabit(fromActualIndex, toActualIndex);
        save();
      }
      render();
    };

    dragHandle.addEventListener("pointerup", finishDrag);
    dragHandle.addEventListener("pointercancel", finishDrag);

    item.addEventListener("touchcancel", () => {
      item.style.transform = "";
      clearDragPreview();
      wrapper.classList.remove("drag-source");
      item.classList.remove("dragging");
    });

    item.appendChild(dragHandle);
    item.appendChild(text);
    item.appendChild(editItemBtn);
    item.appendChild(checkArea);
    wrapper.appendChild(deleteArea);
    wrapper.appendChild(item);
    listEl.appendChild(wrapper);
    renderedCount += 1;
  });

  emptyHintEl.classList.toggle("show", renderedCount === 0);
  updateRate();
}

document.getElementById("addBtn").addEventListener("click", () => {
  openHabitModal("習慣を追加", "", (value, slot) => {
    habits.push({ text: value, done: false, slot });
    save();
    render();
  }, activeTimeSlot);
});
historyBtn.addEventListener("click", () => {
  moveToProgressPage(isHistoryPageVisible() ? 0 : 1);
});

  btn.addEventListener("click", () => {
    setActiveTimeSlot(btn.dataset.slot || "morning");
  });
});
habitSlotButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    setSelectedHabitSlot(btn.dataset.slot || "morning");
  });
});

  btn.addEventListener("click", () => {
    const nextScope = normalizeHistoryScope(btn.dataset.scope || "all");
    setActiveHistoryScope(nextScope, { animate: true });

});

calendarBtn.addEventListener("click", () => {
  openCalendarModal();
});
calendarCloseBtn.addEventListener("click", closeCalendarModal);
calendarModeMonthBtn.addEventListener("click", () => {
  calendarMode = "month";
  renderCalendarView();
});
calendarModeYearBtn.addEventListener("click", () => {
  calendarMode = "year";
  renderCalendarView();
});
calendarPrevBtn.addEventListener("click", () => shiftCalendarCursor(-1));
calendarNextBtn.addEventListener("click", () => shiftCalendarCursor(1));
calendarModalBackdropEl.addEventListener("click", e => {
  if (e.target === calendarModalBackdropEl) {
    closeCalendarModal();
  }
});
calendarModalBackdropEl.addEventListener("touchend", e => {
  if (!calendarModalBackdropEl.classList.contains("show")) return;
  if (!e.changedTouches || e.changedTouches.length === 0) return;
  const touch = e.changedTouches[0];
  const now = Date.now();
  const dt = now - lastTapTime;
  const dx = Math.abs(touch.clientX - lastTapX);
  const dy = Math.abs(touch.clientY - lastTapY);
  const isDoubleTap = dt > 0 && dt < 320 && dx < 24 && dy < 24;
  lastTapTime = now;
  lastTapX = touch.clientX;
  lastTapY = touch.clientY;
  if (isDoubleTap && e.cancelable) {
    e.preventDefault();
  }
}, { passive: false });

menuBtn.addEventListener("click", e => {
  e.stopPropagation();
  setHeaderMenuOpen(!isHeaderMenuOpen);
});
menuExportBtn.addEventListener("click", async () => {
  setHeaderMenuOpen(false);
  const ok = await openConfirmModal({
    title: "エクスポート確認",
    message: "現在のデータをJSONでエクスポートしますか？",
    okText: "エクスポート",
    cancelText: "キャンセル"
  });
  if (!ok) return;
  exportLocalStorageAsJson();
});
menuImportBtn.addEventListener("click", async () => {
  setHeaderMenuOpen(false);
  const ok = await openConfirmModal({
    title: "インポート確認",
    message: "インポートするJSONファイルを選択しますか？",
    okText: "ファイル選択へ",
    cancelText: "キャンセル"
  });
  if (!ok) return;
  importFileInputEl.value = "";
  importFileInputEl.click();
});
menuAppSettingsBtn.addEventListener("click", () => {
  setHeaderMenuOpen(false);
  openAppSettings();
});
headerMenuEl.addEventListener("click", e => {
  if (e.target === headerMenuEl) {
    setHeaderMenuOpen(false);
  }
});

editBtn.addEventListener("click", () => {
  setEditMode(!isEditMode);
});

progressSliderEl.addEventListener("scroll", updateProgressDots, { passive: true });
window.addEventListener("resize", updateProgressDots);

habitModalCancelEl.addEventListener("click", closeHabitModal);
habitModalSaveEl.addEventListener("click", submitHabitModal);
habitModalBackdropEl.addEventListener("click", e => {
  if (e.target === habitModalBackdropEl) {

  }
});
habitModalInputEl.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    submitHabitModal();

  }

settingsNotificationEnabledEl.addEventListener("change", () => {

});

  await saveAppSettingsFromModal();
});
settingsModalBackdropEl.addEventListener("click", e => {
  if (e.target === settingsModalBackdropEl) {
    closeAppSettingsModal();
  }
});

importFileInputEl.addEventListener("change", async e => {
  const target = e.target;
  if (!(target instanceof HTMLInputElement) || !target.files || target.files.length === 0) {
    return;
  }
  const file = target.files[0];
  try {
    const text = await file.text();
    const payload = JSON.parse(text);
    await handleImportPayload(payload);
  } catch {
    alert("インポートエラー: 有効なJSONファイルではありません。");
  }
});

confirmModalCancelEl.addEventListener("click", () => closeConfirmModal(false));
confirmModalOkEl.addEventListener("click", () => closeConfirmModal(true));
confirmModalBackdropEl.addEventListener("click", e => {
  if (e.target === confirmModalBackdropEl && confirmModalConfig.allowBackdropClose) {
    closeConfirmModal(false);
  }
});
document.addEventListener("keydown", e => {
  if (isHeaderMenuOpen && e.key === "Escape") {
    setHeaderMenuOpen(false);
    return;
  }
  if (isSettingsModalOpen && e.key === "Escape") {
    closeAppSettingsModal();
    return;
  }
  if (confirmModalBackdropEl.classList.contains("show")) {
    if (e.key === "Escape" && confirmModalConfig.allowEscapeClose) {
      closeConfirmModal(false);
    }
    return;
  }
  if (calendarModalBackdropEl.classList.contains("show") && e.key === "Escape") {
    closeCalendarModal();
  }
});

if (resetHabitsIfNewDay()) {
  render();
}

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && resetHabitsIfNewDay()) {
    render();
  }
});

setInterval(() => {
  if (document.visibilityState === "visible" && resetHabitsIfNewDay()) {
    render();
  }
}, 60 * 1000);

if (!isEditMode) {
  setEditMode(false);
}

appSettings = loadAppSettings();
setActiveHistoryScope(appSettings.defaultHistoryScope, { animate: false });
setActiveTimeSlot("morning");

render();
updateProgressDots();
void syncNotificationScheduleOnLaunch();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    ensureServiceWorkerRegistration().catch(err => {
      console.warn("Service Worker registration failed:", err);
    });
  });
}
